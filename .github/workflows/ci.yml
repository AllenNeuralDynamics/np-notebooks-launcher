name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Run tests
        run: uv run pytest tests/ -v

  validate-notebook-directives:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Validate notebook directives and filter syntax
        run: |
          uv run python - << 'EOF'
          import pathlib, sys
          from np_notebooks_launcher import (
              load_notebook, filter_notebook, EXPERIMENT_PRESETS,
              parse_cell_directive, _strip_namespace, evaluate_condition,
          )

          nb_path = pathlib.Path("notebooks/dynamic_routing.ipynb")
          if not nb_path.exists():
              print("No notebook found - skipping validation")
              sys.exit(0)

          nb = load_notebook(nb_path)
          errors = []

          # Validate each directive parses and evaluates without error
          dummy_ctx = {k: False for k in ("ephys", "hab", "hab_day_1", "opto", "optotagging", "pretest")}
          for i, cell in enumerate(nb["cells"]):
              d = parse_cell_directive(cell)
              if d is None:
                  continue
              name, condition = d
              if not condition:
                  errors.append(f"Cell {i}: empty condition in directive {name!r}")
                  continue
              _ns, bare = _strip_namespace(condition)
              try:
                  evaluate_condition(bare, dummy_ctx)
              except Exception as exc:
                  errors.append(f"Cell {i}: invalid condition {bare!r}: {exc}")

          # Validate each preset produces a non-empty notebook
          for preset_name, ctx in EXPERIMENT_PRESETS.items():
              filtered = filter_notebook(nb, ctx)
              if not filtered["cells"]:
                  errors.append(f"Preset {preset_name!r} produced 0 cells")

          if errors:
              for e in errors:
                  print("ERROR:", e)
              sys.exit(1)

          print(f"OK: {len(nb['cells'])} cells validated, {len(EXPERIMENT_PRESETS)} presets OK")
          EOF
